name: CI Pipeline              # Workflow name (shows in GitHub UI)

on: [push, pull_request]      # When to run this workflow

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - run: echo "setting up environment"
      - run: echo "Building..."
  parallel-exe:
    runs-on: ubuntu-latest
    steps:
      - run: echo "parallel"
      - run: echo ".."

  test:
    needs: build          # Wait for build to complete
    runs-on: ubuntu-latest
    steps:
      - run: echo "Testing environment"
      - run: echo "Testing..."
  parallel-test:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - run: echo "parallel"
      - run: echo ".."


  deploy:
    needs: [build, test]  # Wait for both build and test
    runs-on: ubuntu-latest
    steps:
      - run: echo "Deployment Environment"
      - run: echo "Deploying..."